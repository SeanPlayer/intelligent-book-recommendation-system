{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2 class="mb-4">通知中心</h2>
    <div class="d-flex justify-content-end mb-3">
        <button class="btn btn-sm btn-outline-secondary me-2" id="markAllRead">全部标记已读</button>
    </div>

    <div id="notification-list" class="list-group">
        <!-- 通过 JavaScript 动态加载 -->
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">加载中...</span>
            </div>
        </div>
    </div>

    <!-- 分页控件 -->
    <nav aria-label="通知分页" class="mt-4" id="pagination" style="display: none;">
        <ul class="pagination justify-content-center">
            <li class="page-item" id="prev-page"><a class="page-link" href="#">上一页</a></li>
            <li class="page-item disabled"><span class="page-link" id="page-info">第 1 页</span></li>
            <li class="page-item" id="next-page"><a class="page-link" href="#">下一页</a></li>
        </ul>
    </nav>
</div>

<script>
let currentPage = 1;
let totalPages = 1;

function loadNotifications(page = 1) {
    fetch(`/api/notifications?page=${page}&per_page=10`)
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('notification-list');
            if (data.items.length === 0) {
                container.innerHTML = '<div class="alert alert-info text-center">暂无通知</div>';
                document.getElementById('pagination').style.display = 'none';
                return;
            }
            let html = '';
            data.items.forEach(n => {
                html += `
                    <div class="list-group-item list-group-item-action d-flex justify-content-between align-items-center ${n.is_read ? '' : 'list-group-item-primary'}">
                        <div class="flex-grow-1 me-3">
                            <a href="${n.link}" class="text-decoration-none text-dark" onclick="markRead(${n.id})">
                                <div>${n.content}</div>
                                <small class="text-muted">${n.created_at}</small>
                            </a>
                        </div>
                        <div>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteNotification(${n.id})" title="删除">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;

            // 更新分页
            currentPage = data.page;
            totalPages = data.pages;
            document.getElementById('page-info').textContent = `第 ${currentPage} 页 / 共 ${totalPages} 页`;
            document.getElementById('pagination').style.display = totalPages > 1 ? 'block' : 'none';
            document.getElementById('prev-page').classList.toggle('disabled', currentPage <= 1);
            document.getElementById('next-page').classList.toggle('disabled', currentPage >= totalPages);
        });
}

// 标记已读
window.markRead = function(notifId) {
    fetch(`/api/notifications/${notifId}/read`, { method: 'POST' })
        .then(() => loadNotifications(currentPage));
};

// 删除通知
window.deleteNotification = function(notifId) {
    if (!confirm('确定要删除这条通知吗？')) return;
    fetch(`/api/notifications/${notifId}/delete`, { method: 'DELETE' })
        .then(() => loadNotifications(currentPage));
};

// 全部标记已读
document.getElementById('markAllAll')?.addEventListener('click', function() {
    fetch('/api/notifications/read-all', { method: 'POST' })
        .then(() => loadNotifications(currentPage));
});

// 分页事件
document.getElementById('prev-page')?.addEventListener('click', (e) => {
    e.preventDefault();
    if (currentPage > 1) loadNotifications(currentPage - 1);
});
document.getElementById('next-page')?.addEventListener('click', (e) => {
    e.preventDefault();
    if (currentPage < totalPages) loadNotifications(currentPage + 1);
});

// 初始化
loadNotifications();
</script>
{% endblock %}
